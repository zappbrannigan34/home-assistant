          {% set error_outside_deadband = 0 if (error | abs) <= deadband else ((error | abs) - deadband) * (1 if error > 0 else -1) %}
          {% set forecast_delta = forecast_error - error %}
          {% set forecast_assist = (forecast_delta / ([vent_gain * 10, 1] | max)) * range_span %}
          {% set forecast_assist = [[forecast_assist, -0.20 * range_span] | max, 0.20 * range_span] | min %}
          {% set previous_integral = state_attr('sensor.ventilation_eva_recommended_position', 'integral_term') | float(0) %}
          {% set previous_demand = states('sensor.ventilation_eva_recommended_position') | float(applied_position) %}
          {% set last_adjustment_ts = as_timestamp(states('input_datetime.ventilation_eva_last_adjustment')) | float(0) %}
          {% set gate_blocked = ((as_timestamp(now()) - last_adjustment_ts) < 1700) and ((previous_demand - applied_position) | abs > 2) %}
          {% set unclamped_without_integral = equilibrium_opening + (kp_auto * error_outside_deadband) + forecast_assist %}
          {% if gate_blocked %}
            {% set integral_term = previous_integral * 0.995 %}
          {% elif (unclamped_without_integral <= min_pos and error_outside_deadband < 0) or (unclamped_without_integral >= max_pos and error_outside_deadband > 0) %}
