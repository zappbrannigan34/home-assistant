# package: ventilation_zap_left
# Version: 1.1.0
# Last Updated: 2026-04-13
# Description: Hybrid long-horizon CO2 ventilation control for Drivent V2 (zap_left window)
#
# АЛГОРИТМ: Гибридное зонное управление по сглаженному CO2 и длинному тренду.
# НЕ PID — привод двигается только когда 30-минутное окно подтверждает необходимость.
# Оценка каждые 30 минут, шаг 5% или 2%, deadband ±50 ppm.
#
# РЕСУРС ПРИВОДА: WindowMaster рейтинг ~10 000 циклов.
# С длинным тренд-фильтром: реальных движений заметно меньше, чем при коротком шумном контуре.
# Drivent V2 магнитный датчик надёжнее V1 — реальный ресурс выше.

# ──────────────────────────────────────────────────────────────────────────────
#  INPUT NUMBERS (настройки регулирования)
# ──────────────────────────────────────────────────────────────────────────────

input_number:
  ventilation_target_co2:
    name: "Ventilation Target CO2"
    min: 300
    max: 1000
    step: 50
    unit_of_measurement: "ppm"
    icon: mdi:molecule-co2
    mode: box

  ventilation_min_position:
    name: "Ventilation Min Position"
    min: 0
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:arrow-collapse-down
    mode: box

  ventilation_max_position:
    name: "Ventilation Max Position"
    min: 20
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:arrow-collapse-up
    mode: box

  ventilation_min_outdoor_temp:
    name: "Ventilation Min Outdoor Temp"
    min: -30
    max: 10
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-alert
    mode: box

input_datetime:
  ventilation_last_adjustment:
    name: "Ventilation Last Adjustment"
    has_date: true
    has_time: true
    icon: mdi:clock-check-outline
    initial: "2000-01-01 00:00:00"

# ──────────────────────────────────────────────────────────────────────────────
#  STATISTICS SENSORS (сглаживание и длинный тренд CO2)
# ──────────────────────────────────────────────────────────────────────────────

sensor:
  - platform: statistics
    name: "Ventilation CO2 Mean 30m"
    unique_id: ventilation_co2_mean_30m
    entity_id: sensor.sensor_zap_co2
    state_characteristic: average_step
    max_age:
      minutes: 30
    sampling_size: 240
    keep_last_sample: true
    precision: 1

  - platform: statistics
    name: "Ventilation CO2 Change 30m"
    unique_id: ventilation_co2_change_30m
    entity_id: sensor.sensor_zap_co2
    state_characteristic: change
    max_age:
      minutes: 30
    sampling_size: 240
    keep_last_sample: true
    precision: 1

# ──────────────────────────────────────────────────────────────────────────────
#  TEMPLATE SENSORS
# ──────────────────────────────────────────────────────────────────────────────

template:
  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 1: ДОЛГИЙ ТРЕНД CO2 (30-минутное изменение + сглаженное среднее)
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: state
        entity_id:
          - sensor.ventilation_co2_mean_30m
          - sensor.ventilation_co2_change_30m
      - platform: homeassistant
        event: start
    sensor:
      - name: "CO2 Trend"
        unique_id: ventilation_co2_trend
        icon: mdi:trending-up
        availability: >
          {{ has_value('sensor.sensor_zap_co2') and
             has_value('sensor.ventilation_co2_mean_30m') and
             has_value('sensor.ventilation_co2_change_30m') }}
        state: >
          {% set change_30m = states('sensor.ventilation_co2_change_30m') | float(0) %}
          {% set trend_threshold = 30 %}
          {% if change_30m > trend_threshold %}
            rising
          {% elif change_30m < -trend_threshold %}
            falling
          {% else %}
            stable
          {% endif %}
        attributes:
          current_co2: "{{ states('sensor.sensor_zap_co2') | float(0) }}"
          co2_mean_30m: "{{ states('sensor.ventilation_co2_mean_30m') | float(0) }}"
          co2_change_30m: "{{ states('sensor.ventilation_co2_change_30m') | float(0) }}"
          trend_threshold_ppm: 30
          window_minutes: 30
          mean_age_coverage_ratio: "{{ state_attr('sensor.ventilation_co2_mean_30m', 'age_coverage_ratio') | default(0) }}"
          change_age_coverage_ratio: "{{ state_attr('sensor.ventilation_co2_change_30m', 'age_coverage_ratio') | default(0) }}"

  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 2: РЕКОМЕНДУЕМАЯ ПОЗИЦИЯ ОКНА (30-минутный гибридный контур)
  #  Оценка каждые 30 минут, умеренные зоны требуют 2 подтверждения подряд
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/30"
        id: scheduled
      - platform: state
        entity_id:
          - sensor.sensor_zap_co2
          - sensor.ventilation_co2_mean_30m
          - sensor.ventilation_co2_change_30m
          - cover.drivent_zap_left_driventokonnyi_privod
          - input_number.ventilation_target_co2
          - input_number.ventilation_min_position
          - input_number.ventilation_max_position
        id: refresh
      - platform: homeassistant
        event: start
        id: start
    sensor:
      - name: "Ventilation Recommended Position"
        unique_id: ventilation_recommended_position
        unit_of_measurement: "%"
        icon: mdi:window-open-variant
        availability: >
          {{ has_value('sensor.sensor_zap_co2') and
             has_value('sensor.ventilation_co2_mean_30m') and
             has_value('sensor.ventilation_co2_change_30m') and
             has_value('sensor.co2_trend') and
             has_value('cover.drivent_zap_left_driventokonnyi_privod') }}
        state: >
          {% set raw_co2 = states('sensor.sensor_zap_co2') | float(650) %}
          {% set co2 = states('sensor.ventilation_co2_mean_30m') | float(raw_co2) %}
          {% set change_30m = states('sensor.ventilation_co2_change_30m') | float(0) %}
          {% set trend = states('sensor.co2_trend') %}
          {% set target = states('input_number.ventilation_target_co2') | float(650) %}
          {% set current_pos = state_attr('cover.drivent_zap_left_driventokonnyi_privod', 'current_position') | int(0) %}
          {% set min_pos = states('input_number.ventilation_min_position') | int(0) %}
          {% set max_pos = states('input_number.ventilation_max_position') | int(80) %}
          {% set evaluation_trigger = trigger.id | default('scheduled') %}
          {% set previous_recommended = states('sensor.ventilation_recommended_position') %}
          {% set has_previous_recommended = previous_recommended not in ['unknown', 'unavailable', 'none', ''] %}
          {% set prev_pending_direction = state_attr('sensor.ventilation_recommended_position', 'pending_direction') | default('hold') %}
          {% set prev_pending_count = state_attr('sensor.ventilation_recommended_position', 'pending_count') | default(0) | int(0) %}
          {% if evaluation_trigger == 'refresh' and has_previous_recommended %}
            {{ previous_recommended | int(current_pos) }}
          {% elif evaluation_trigger == 'start' %}
            {{ current_pos }}
          {% else %}
            {% set ns = namespace(zone='deadband', candidate_step=0, candidate_direction='hold', confirmation_required=false, severe_override=false) %}

            {# --- ЗОНЫ ПО 30-МИНУТНОМУ СГЛАЖЕННОМУ CO2 --- #}
            {% if co2 > target + 150 %}
              {% set ns.zone = 'high_critical' %}
              {% if trend in ['rising', 'stable'] %}
                {% set ns.candidate_step = 5 %}
                {% set ns.candidate_direction = 'open_critical' %}
                {% set ns.severe_override = true %}
              {% endif %}
            {% elif co2 > target + 50 %}
              {% set ns.zone = 'high_moderate' %}
              {% if trend in ['rising', 'stable'] %}
                {% set ns.candidate_step = 2 %}
                {% set ns.candidate_direction = 'open_moderate' %}
                {% set ns.confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 50 %}
              {% set ns.zone = 'deadband' %}
              {% if trend == 'rising' %}
                {% set ns.candidate_step = 2 %}
                {% set ns.candidate_direction = 'open_preventive' %}
                {% set ns.confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 150 %}
              {% set ns.zone = 'low_moderate' %}
              {% if trend == 'falling' %}
                {% set ns.candidate_step = -5 %}
                {% set ns.candidate_direction = 'close_moderate' %}
                {% set ns.confirmation_required = true %}
              {% endif %}
            {% else %}
              {% set ns.zone = 'low_critical' %}
              {% if trend in ['falling', 'stable'] %}
                {% set ns.candidate_step = -5 %}
                {% set ns.candidate_direction = 'close_critical' %}
                {% set ns.severe_override = true %}
              {% endif %}
            {% endif %}

            {# --- ПОДТВЕРЖДЕНИЕ СИГНАЛА В УМЕРЕННЫХ ЗОНАХ --- #}
            {% set confirmed_step = 0 %}
            {% set pending_direction = 'hold' %}
            {% set pending_count = 0 %}

            {% if ns.candidate_step == 0 %}
              {% set confirmed_step = 0 %}
            {% elif ns.severe_override %}
              {% set confirmed_step = ns.candidate_step %}
            {% elif not ns.confirmation_required %}
              {% set confirmed_step = ns.candidate_step %}
            {% else %}
              {% if prev_pending_direction == ns.candidate_direction %}
                {% set pending_count = prev_pending_count + 1 %}
              {% else %}
                {% set pending_count = 1 %}
              {% endif %}

              {% if pending_count >= 2 %}
                {% set confirmed_step = ns.candidate_step %}
              {% else %}
                {% set pending_direction = ns.candidate_direction %}
              {% endif %}
            {% endif %}

            {% set new_pos = current_pos + confirmed_step %}
            {% set new_pos = [new_pos, min_pos] | max %}
            {% set new_pos = [new_pos, max_pos] | min %}
            {{ new_pos | int }}
          {% endif %}
        attributes:
          raw_co2: "{{ states('sensor.sensor_zap_co2') | float(0) }}"
          co2_mean_30m: "{{ states('sensor.ventilation_co2_mean_30m') | float(0) }}"
          co2_change_30m: "{{ states('sensor.ventilation_co2_change_30m') | float(0) }}"
          trend: "{{ states('sensor.co2_trend') }}"
          target: "{{ states('input_number.ventilation_target_co2') | float(650) }}"
          current_position: "{{ state_attr('cover.drivent_zap_left_driventokonnyi_privod', 'current_position') | int(0) }}"
          pending_direction: >
            {% set raw_co2 = states('sensor.sensor_zap_co2') | float(650) %}
            {% set co2 = states('sensor.ventilation_co2_mean_30m') | float(raw_co2) %}
            {% set trend = states('sensor.co2_trend') %}
            {% set target = states('input_number.ventilation_target_co2') | float(650) %}
            {% set evaluation_trigger = trigger.id | default('scheduled') %}
            {% set prev_pending_direction = state_attr('sensor.ventilation_recommended_position', 'pending_direction') | default('hold') %}
            {% set prev_pending_count = state_attr('sensor.ventilation_recommended_position', 'pending_count') | default(0) | int(0) %}
            {% if evaluation_trigger != 'scheduled' %}
              {{ prev_pending_direction }}
            {% else %}
            {% set candidate_direction = 'hold' %}
            {% set candidate_step = 0 %}
            {% set confirmation_required = false %}
            {% set severe_override = false %}
            {% if co2 > target + 150 %}
              {% if trend in ['rising', 'stable'] %}
                {% set candidate_direction = 'open_critical' %}
                {% set candidate_step = 5 %}
                {% set severe_override = true %}
              {% endif %}
            {% elif co2 > target + 50 %}
              {% if trend in ['rising', 'stable'] %}
                {% set candidate_direction = 'open_moderate' %}
                {% set candidate_step = 2 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 50 %}
              {% if trend == 'rising' %}
                {% set candidate_direction = 'open_preventive' %}
                {% set candidate_step = 2 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 150 %}
              {% if trend == 'falling' %}
                {% set candidate_direction = 'close_moderate' %}
                {% set candidate_step = -5 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% else %}
              {% if trend in ['falling', 'stable'] %}
                {% set candidate_direction = 'close_critical' %}
                {% set candidate_step = -5 %}
                {% set severe_override = true %}
              {% endif %}
            {% endif %}

            {% if candidate_step == 0 or severe_override or not confirmation_required %}
              hold
            {% elif prev_pending_direction == candidate_direction and (prev_pending_count + 1) >= 2 %}
              hold
            {% else %}
              {{ candidate_direction }}
            {% endif %}
            {% endif %}
          pending_count: >
            {% set raw_co2 = states('sensor.sensor_zap_co2') | float(650) %}
            {% set co2 = states('sensor.ventilation_co2_mean_30m') | float(raw_co2) %}
            {% set trend = states('sensor.co2_trend') %}
            {% set target = states('input_number.ventilation_target_co2') | float(650) %}
            {% set evaluation_trigger = trigger.id | default('scheduled') %}
            {% set prev_pending_direction = state_attr('sensor.ventilation_recommended_position', 'pending_direction') | default('hold') %}
            {% set prev_pending_count = state_attr('sensor.ventilation_recommended_position', 'pending_count') | default(0) | int(0) %}
            {% if evaluation_trigger != 'scheduled' %}
              {{ prev_pending_count }}
            {% else %}
            {% set candidate_direction = 'hold' %}
            {% set candidate_step = 0 %}
            {% set confirmation_required = false %}
            {% set severe_override = false %}
            {% if co2 > target + 150 %}
              {% if trend in ['rising', 'stable'] %}
                {% set candidate_direction = 'open_critical' %}
                {% set candidate_step = 5 %}
                {% set severe_override = true %}
              {% endif %}
            {% elif co2 > target + 50 %}
              {% if trend in ['rising', 'stable'] %}
                {% set candidate_direction = 'open_moderate' %}
                {% set candidate_step = 2 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 50 %}
              {% if trend == 'rising' %}
                {% set candidate_direction = 'open_preventive' %}
                {% set candidate_step = 2 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 150 %}
              {% if trend == 'falling' %}
                {% set candidate_direction = 'close_moderate' %}
                {% set candidate_step = -5 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% else %}
              {% if trend in ['falling', 'stable'] %}
                {% set candidate_direction = 'close_critical' %}
                {% set candidate_step = -5 %}
                {% set severe_override = true %}
              {% endif %}
            {% endif %}

            {% if candidate_step == 0 or severe_override or not confirmation_required %}
              0
            {% elif prev_pending_direction == candidate_direction %}
              {{ prev_pending_count + 1 }}
            {% else %}
              1
            {% endif %}
            {% endif %}
          last_step: >
            {% set raw_co2 = states('sensor.sensor_zap_co2') | float(650) %}
            {% set co2 = states('sensor.ventilation_co2_mean_30m') | float(raw_co2) %}
            {% set trend = states('sensor.co2_trend') %}
            {% set target = states('input_number.ventilation_target_co2') | float(650) %}
            {% set evaluation_trigger = trigger.id | default('scheduled') %}
            {% set prev_pending_direction = state_attr('sensor.ventilation_recommended_position', 'pending_direction') | default('hold') %}
            {% set prev_pending_count = state_attr('sensor.ventilation_recommended_position', 'pending_count') | default(0) | int(0) %}
            {% if evaluation_trigger != 'scheduled' %}
              0
            {% else %}
            {% set candidate_direction = 'hold' %}
            {% set candidate_step = 0 %}
            {% set confirmation_required = false %}
            {% set severe_override = false %}
            {% if co2 > target + 150 %}
              {% if trend in ['rising', 'stable'] %}
                {% set candidate_direction = 'open_critical' %}
                {% set candidate_step = 5 %}
                {% set severe_override = true %}
              {% endif %}
            {% elif co2 > target + 50 %}
              {% if trend in ['rising', 'stable'] %}
                {% set candidate_direction = 'open_moderate' %}
                {% set candidate_step = 2 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 50 %}
              {% if trend == 'rising' %}
                {% set candidate_direction = 'open_preventive' %}
                {% set candidate_step = 2 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% elif co2 > target - 150 %}
              {% if trend == 'falling' %}
                {% set candidate_direction = 'close_moderate' %}
                {% set candidate_step = -5 %}
                {% set confirmation_required = true %}
              {% endif %}
            {% else %}
              {% if trend in ['falling', 'stable'] %}
                {% set candidate_direction = 'close_critical' %}
                {% set candidate_step = -5 %}
                {% set severe_override = true %}
              {% endif %}
            {% endif %}

            {% if candidate_step == 0 %}
              0
            {% elif severe_override or not confirmation_required %}
              {{ candidate_step }}
            {% elif prev_pending_direction == candidate_direction and (prev_pending_count + 1) >= 2 %}
              {{ candidate_step }}
            {% else %}
              0
            {% endif %}
            {% endif %}

      # ──────────────────────────────────────────────────────────────────────
      #  ОШИБКА CO2 (для дашборда и диагностики)
      # ──────────────────────────────────────────────────────────────────────
      - name: "Ventilation CO2 Error"
        unique_id: ventilation_co2_error
        unit_of_measurement: "ppm"
        state_class: measurement
        icon: mdi:delta
        availability: >
          {{ has_value('sensor.sensor_zap_co2') }}
        state: >
          {% set co2 = states('sensor.sensor_zap_co2') | float(650) %}
          {% set target = states('input_number.ventilation_target_co2') | float(650) %}
          {{ (target - co2) | round(0) }}

# ──────────────────────────────────────────────────────────────────────────────
#  AUTOMATIONS
# ──────────────────────────────────────────────────────────────────────────────

automation:
  # ══════════════════════════════════════════════════════════════════════════
  #  ОСНОВНОЕ УПРАВЛЕНИЕ: применить рекомендуемую позицию к приводу
  #  Rate limit: не чаще 1 реального движения в 30 минут
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Управление вентиляцией по CO2"
    alias: ventilation_control_main
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: state
        entity_id: sensor.ventilation_recommended_position

    condition:
      # Позиция реально изменилась
      - condition: template
        value_template: >
          {% set recommended = states('sensor.ventilation_recommended_position') | int(-1) %}
          {% set current = state_attr('cover.drivent_zap_left_driventokonnyi_privod', 'current_position') | int(0) %}
          {{ recommended >= 0 and recommended != current }}

      # Rate limit: минимум 30 минут между движениями привода
      - condition: template
        value_template: >
          {% set last = states('input_datetime.ventilation_last_adjustment') %}
          {% set last_ts = as_timestamp(last) | float(0) %}
          {{ (as_timestamp(now()) - last_ts) >= 1800 }}

      # Нет активных ошибок привода
      - condition: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        state: "off"

      # CO2 сенсор доступен
      - condition: template
        value_template: >
          {{ has_value('sensor.sensor_zap_co2') }}

      # На улице не холоднее минимального порога
      - condition: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor >= min_temp }}

    action:
      - variables:
          recommended: "{{ states('sensor.ventilation_recommended_position') | int(0) }}"

      - service: cover.set_cover_position
        target:
          entity_id: cover.drivent_zap_left_driventokonnyi_privod
        data:
          position: "{{ recommended }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ══════════════════════════════════════════════════════════════════════════
  #  АВАРИЙНОЕ ЗАКРЫТИЕ: температура, дождь, перегрузка, недоступность CO2
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Аварийное закрытие окна"
    alias: ventilation_safety_close
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      # Температура на улице упала ниже минимума
      - platform: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor < min_temp }}
        id: "cold"

      # Перегрузка привода
      - platform: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        to: "on"
        id: "overload"

      # CO2 сенсор стал unavailable (потеря связи)
      - platform: state
        entity_id: sensor.sensor_zap_co2
        to: "unavailable"
        for:
          minutes: 2
        id: "co2_lost"

      # Периодическая проверка (каждые 10 мин)
      - platform: time_pattern
        minutes: "/10"
        id: "periodic"

    condition:
      # Окно реально открыто
      - condition: template
        value_template: >
          {{ state_attr('cover.drivent_zap_left_driventokonnyi_privod', 'current_position') | int(0) > 0 }}

      # Хотя бы одно условие для закрытия выполнено
      - condition: or
        conditions:
          # Слишком холодно на улице
          - condition: template
            value_template: >
              {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
              {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
              {{ outdoor < min_temp }}
          # Перегрузка привода
          - condition: state
            entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
            state: "on"
          # CO2 сенсор недоступен
          - condition: state
            entity_id: sensor.sensor_zap_co2
            state: "unavailable"

    action:
      - variables:
          reason: >
            {% if is_state('binary_sensor.drivent_zap_left_datchik_peregruzki', 'on') %}
              overload
            {% elif is_state('sensor.sensor_zap_co2', 'unavailable') %}
              co2_sensor_lost
            {% else %}
              cold_outdoor
            {% endif %}

      - service: cover.close_cover
        target:
          entity_id: cover.drivent_zap_left_driventokonnyi_privod

      - service: notify.zapgroup
        data:
          title: "🪟 Окно закрыто (безопасность)"
          message: >
            Причина: {{ reason }}.
            {% if reason == 'cold_outdoor' %}
              Температура на улице: {{ state_attr('weather.forecast_home_assistant', 'temperature') }}°C
              (мин: {{ states('input_number.ventilation_min_outdoor_temp') }}°C).
            {% elif reason == 'overload' %}
              Привод обнаружил перегрузку. Проверьте окно.
            {% elif reason == 'co2_sensor_lost' %}
              Датчик CO2 недоступен. Окно закрыто в целях безопасности.
            {% endif %}

  # ══════════════════════════════════════════════════════════════════════════
  #  УВЕДОМЛЕНИЕ ОБ ОШИБКЕ ПРИВОДА
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Ошибка привода окна"
    alias: ventilation_device_error
    mode: single
    initial_state: true

    trigger:
      - platform: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        to: "on"

    action:
      - service: notify.zapgroup
        data:
          title: "⚠️ Перегрузка привода Drivent (zap_left)"
          message: >
            Привод обнаружил перегрузку. Проверьте:
            - не зажато ли что-то в окне
            - открывается ли окно без заеданий
            - не заблокирована ли ручка

            Текущий CO2: {{ states('sensor.sensor_zap_co2') }} ppm
            Позиция окна: {{ state_attr('cover.drivent_zap_left_driventokonnyi_privod', 'current_position') }}%
