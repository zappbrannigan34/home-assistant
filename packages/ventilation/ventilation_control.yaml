             has_value('sensor.ventilation_eva_co2_slope') and
             has_value('sensor.ventilation_eva_forecast_error_30m') }}
        state: >
          {% set raw_co2 = states('sensor.sensor_eva_co2') | float(650) %}
          {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(raw_co2) %}
          {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
          {% set forecast_co2 = states('sensor.ventilation_eva_forecast_co2_30m') | float(filtered) %}
          {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
          {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
          {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
          {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
          {% set forecast_error = forecast_co2 - target %}
          {% set error = filtered - target %}
          {% set range_span = [max_pos - min_pos, 0] | max %}
          {% set applied_position = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | float(min_pos) %}
          {% set applied_fraction = ((applied_position - min_pos) / (range_span if range_span > 0 else 1)) if range_span > 0 else 0 %}
          {% set applied_fraction = [[applied_fraction, 0] | max, 1] | min %}
          {% set previous_closed_load = state_attr('sensor.ventilation_eva_recommended_position', 'closed_load_estimate_ppm_min') | float(0.2) %}
          {% if applied_fraction <= 0.10 and error > deadband and slope > -0.20 %}
            {% set closed_load = (previous_closed_load * 0.85) + ([slope, 0.05] | max * 0.15) %}
          {% elif applied_fraction <= 0.10 and error < (0 - deadband) %}
            {% set closed_load = (previous_closed_load * 0.97) + 0.003 %}
          {% else %}
            {% set closed_load = previous_closed_load %}
          {% endif %}

          {% set previous_vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
          {% if applied_fraction >= 0.20 %}
            {% set vent_gain_sample = ((closed_load - slope) / applied_fraction) if applied_fraction > 0 else previous_vent_gain %}
            {% set vent_gain_sample = [vent_gain_sample, 0.05] | max %}
            {% set vent_gain = (previous_vent_gain * 0.85) + (vent_gain_sample * 0.15) %}
          {% else %}
            {% set vent_gain = previous_vent_gain %}
          {% endif %}

          {% set previous_tau = state_attr('sensor.ventilation_eva_recommended_position', 'tau_estimate_min') | float(25) %}
          {% if (error > 25 and slope < -0.05) or (error < -25 and slope > 0.05) %}
            {% set tau_sample = ((error | abs) / ([slope | abs, 0.05] | max)) %}
            {% set tau_sample = [[tau_sample, 6] | max, 90] | min %}
            {% set tau_estimate = (previous_tau * 0.85) + (tau_sample * 0.15) %}
          {% else %}
