          {% elif (error | abs) <= deadband %}
            {% set integral_term = previous_integral * 0.98 %}
          {% else %}
            {% set integral_term = previous_integral + (ki_auto * error_outside_deadband) %}
          {% endif %}
          {% set integral_limit = range_span * 0.80 %}
          {% set integral_term = [[integral_term, 0 - integral_limit] | max, integral_limit] | min %}
          {% set raw_output = equilibrium_opening + (kp_auto * error_outside_deadband) + forecast_assist + integral_term %}
          {% set recommended = [([raw_output, min_pos] | max), max_pos] | min %}
          {{ recommended | round(1) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_eva_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_eva_co2_filtered') | float(0) }}"
          slope_ppm_min: "{{ states('sensor.ventilation_eva_co2_slope') | float(0) }}"
          forecast_co2_30m: "{{ states('sensor.ventilation_eva_forecast_co2_30m') | float(0) }}"
          forecast_error_30m: "{{ states('sensor.ventilation_eva_forecast_error_30m') | float(0) }}"
          target: "{{ states('input_number.ventilation_eva_target_co2') | float(650) }}"
          min_position: "{{ states('input_number.ventilation_eva_min_position') | int(0) }}"
          max_position: "{{ states('input_number.ventilation_eva_max_position') | int(80) }}"
          deadband_ppm: "{{ states('input_number.ventilation_eva_deadband_ppm') | float(50) }}"
          controller_family: room_pi_auto_identified
          current_applied_position: "{{ state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | float(0) }}"
          controller_mode: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
            {% set error = filtered - target %}
            {% if error > deadband %}
              opening_to_reduce_co2
            {% elif error < (0 - deadband) %}
              closing_to_hold_heat
            {% else %}
              holding_equilibrium
            {% endif %}
          dead_zone_state: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
            {% if ((filtered - target) | abs) <= deadband %}
              inside_dead_zone
            {% else %}
              outside_dead_zone
            {% endif %}
          anti_windup_state: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set error = filtered - target %}
            {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set applied_position = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | float(min_pos) %}
            {% set previous_demand = states('sensor.ventilation_eva_recommended_position') | float(applied_position) %}
            {% set last_adjustment_ts = as_timestamp(states('input_datetime.ventilation_eva_last_adjustment')) | float(0) %}
            {% set gate_blocked = ((as_timestamp(now()) - last_adjustment_ts) < 1700) and ((previous_demand - applied_position) | abs > 2) %}
            {% if gate_blocked %}
              gated_freeze
            {% elif (error | abs) <= deadband %}
              deadband_decay
            {% else %}
              active_integrating
            {% endif %}
          error_outside_deadband_ppm: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
            {% set error = filtered - target %}
            {{ (0 if (error | abs) <= deadband else ((error | abs) - deadband) * (1 if error > 0 else -1)) | round(1) }}
          slope_factor: >
            {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
            {{ ([([slope / 2.5, 1] | min), -1] | max) | round(3) }}
          forecast_assist_pct: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set forecast_error = states('sensor.ventilation_eva_forecast_error_30m') | float(0) %}
            {% set error = filtered - target %}
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
            {% set forecast_delta = forecast_error - error %}
            {% set assist = (forecast_delta / ([vent_gain * 10, 1] | max)) * range_span %}
            {{ ([[assist, -0.20 * range_span] | max, 0.20 * range_span] | min) | round(2) }}
          equilibrium_opening: >
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set closed_load = state_attr('sensor.ventilation_eva_recommended_position', 'closed_load_estimate_ppm_min') | float(0.2) %}
            {% set vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
            {% set fraction = [[(closed_load / ([vent_gain, 0.05] | max)), 0] | max, 1] | min %}
            {{ (min_pos + (range_span * fraction)) | round(2) }}
          kp_auto_pct_per_ppm: >
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
            {% set tau = state_attr('sensor.ventilation_eva_recommended_position', 'tau_estimate_min') | float(25) %}
            {% set kp = (0.80 * range_span) / ([vent_gain * tau, 5] | max) %}
            {{ ([[kp, 0.005] | max, 0.25] | min) | round(4) }}
          ki_auto_pct_per_ppm_min: >
            {% set kp = state_attr('sensor.ventilation_eva_recommended_position', 'kp_auto_pct_per_ppm') | float(0.05) %}
            {% set tau = state_attr('sensor.ventilation_eva_recommended_position', 'tau_estimate_min') | float(25) %}
            {% set ti = [[tau * 1.20, 12] | max, 90] | min %}
            {{ (kp / ti) | round(5) }}
          tau_estimate_min: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set error = filtered - target %}
            {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
            {% set previous_tau = state_attr('sensor.ventilation_eva_recommended_position', 'tau_estimate_min') | float(25) %}
            {% if (error > 25 and slope < -0.05) or (error < -25 and slope > 0.05) %}
              {% set sample = ((error | abs) / ([slope | abs, 0.05] | max)) %}
              {% set sample = [[sample, 6] | max, 90] | min %}
              {{ ((previous_tau * 0.85) + (sample * 0.15)) | round(2) }}
            {% else %}
              {{ previous_tau | round(2) }}
            {% endif %}
          vent_gain_estimate_ppm_min_per_fraction: >
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set applied_position = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | float(min_pos) %}
            {% set applied_fraction = ((applied_position - min_pos) / (range_span if range_span > 0 else 1)) if range_span > 0 else 0 %}
            {% set applied_fraction = [[applied_fraction, 0] | max, 1] | min %}
            {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
            {% set closed_load = state_attr('sensor.ventilation_eva_recommended_position', 'closed_load_estimate_ppm_min') | float(0.2) %}
            {% set previous_vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
            {% if applied_fraction >= 0.20 %}
              {% set sample = ((closed_load - slope) / applied_fraction) if applied_fraction > 0 else previous_vent_gain %}
              {% set sample = [sample, 0.05] | max %}
              {{ ((previous_vent_gain * 0.85) + (sample * 0.15)) | round(3) }}
            {% else %}
              {{ previous_vent_gain | round(3) }}
            {% endif %}
          closed_load_estimate_ppm_min: >
            {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set applied_position = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | float(min_pos) %}
            {% set applied_fraction = ((applied_position - min_pos) / (range_span if range_span > 0 else 1)) if range_span > 0 else 0 %}
            {% set applied_fraction = [[applied_fraction, 0] | max, 1] | min %}
            {% set previous_closed_load = state_attr('sensor.ventilation_eva_recommended_position', 'closed_load_estimate_ppm_min') | float(0.2) %}
            {% if applied_fraction <= 0.10 and error > deadband and slope > -0.20 %}
              {{ ((previous_closed_load * 0.85) + ([slope, 0.05] | max * 0.15)) | round(3) }}
            {% elif applied_fraction <= 0.10 and error < (0 - deadband) %}
              {{ ((previous_closed_load * 0.97) + 0.003) | round(3) }}
            {% else %}
              {{ previous_closed_load | round(3) }}
            {% endif %}
          raw_controller_output: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set error = filtered - target %}
            {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
            {% set forecast_error = states('sensor.ventilation_eva_forecast_error_30m') | float(0) %}
            {% set error_outside = 0 if (error | abs) <= deadband else ((error | abs) - deadband) * (1 if error > 0 else -1) %}
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set equilibrium = state_attr('sensor.ventilation_eva_recommended_position', 'equilibrium_opening') | float(min_pos) %}
            {% set kp = state_attr('sensor.ventilation_eva_recommended_position', 'kp_auto_pct_per_ppm') | float(0.05) %}
            {% set vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
            {% set assist = ((forecast_error - error) / ([vent_gain * 10, 1] | max)) * range_span %}
            {% set assist = [[assist, -0.20 * range_span] | max, 0.20 * range_span] | min %}
            {% set integral_term = state_attr('sensor.ventilation_eva_recommended_position', 'integral_term') | float(0) %}
            {% set raw_output = equilibrium + (kp * error_outside) + assist + integral_term %}
            {{ raw_output | round(2) }}

          integral_term: >
            {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
            {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
            {% set error = filtered - target %}
            {% set deadband = states('input_number.ventilation_eva_deadband_ppm') | float(50) %}
            {% set min_pos = states('input_number.ventilation_eva_min_position') | int(0) %}
            {% set max_pos = states('input_number.ventilation_eva_max_position') | int(80) %}
            {% set range_span = [max_pos - min_pos, 0] | max %}
            {% set previous_integral = state_attr('sensor.ventilation_eva_recommended_position', 'integral_term') | float(0) %}
            {% set applied_position = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | float(min_pos) %}
            {% set previous_demand = states('sensor.ventilation_eva_recommended_position') | float(applied_position) %}
            {% set last_adjustment_ts = as_timestamp(states('input_datetime.ventilation_eva_last_adjustment')) | float(0) %}
            {% set gate_blocked = ((as_timestamp(now()) - last_adjustment_ts) < 1700) and ((previous_demand - applied_position) | abs > 2) %}
            {% set error_outside = 0 if (error | abs) <= deadband else ((error | abs) - deadband) * (1 if error > 0 else -1) %}
            {% set equilibrium = state_attr('sensor.ventilation_eva_recommended_position', 'equilibrium_opening') | float(min_pos) %}
            {% set kp = state_attr('sensor.ventilation_eva_recommended_position', 'kp_auto_pct_per_ppm') | float(0.05) %}
            {% set ki = state_attr('sensor.ventilation_eva_recommended_position', 'ki_auto_pct_per_ppm_min') | float(0.002) %}
            {% set vent_gain = state_attr('sensor.ventilation_eva_recommended_position', 'vent_gain_estimate_ppm_min_per_fraction') | float(0.8) %}
            {% set forecast_error = states('sensor.ventilation_eva_forecast_error_30m') | float(error) %}
            {% set forecast_delta = forecast_error - error %}
            {% set assist = (forecast_delta / ([vent_gain * 10, 1] | max)) * range_span %}
            {% set assist = [[assist, -0.20 * range_span] | max, 0.20 * range_span] | min %}
            {% set unclamped = equilibrium + (kp * error_outside) + assist %}
            {% if gate_blocked %}
              {% set new_integral = previous_integral * 0.995 %}
            {% elif (unclamped <= min_pos and error_outside < 0) or (unclamped >= max_pos and error_outside > 0) %}
              {% set new_integral = previous_integral * 0.98 %}
            {% elif (error | abs) <= deadband %}
              {% set new_integral = previous_integral * 0.98 %}
            {% else %}
              {% set new_integral = previous_integral + (ki * error_outside) %}
            {% endif %}
            {% set integral_limit = range_span * 0.80 %}
            {{ ([[new_integral, 0 - integral_limit] | max, integral_limit] | min) | round(3) }}

      - name: "Ventilation Eva CO2 Error"
        unique_id: ventilation_eva_co2_error
        unit_of_measurement: "ppm"
        state_class: measurement
        icon: mdi:delta
        availability: >
          {{ has_value('sensor.ventilation_eva_co2_filtered') }}
        state: >
          {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(0) %}
          {% set target = states('input_number.ventilation_eva_target_co2') | float(650) %}
          {{ (filtered - target) | round(0) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_eva_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_eva_co2_filtered') | float(0) }}"
          forecast_co2_30m: "{{ states('sensor.ventilation_eva_forecast_co2_30m') | float(0) }}"
          forecast_error_10m: "{{ states('sensor.ventilation_eva_forecast_error_30m') | float(0) }}"
          error_source: "filtered_co2_error"

# ──────────────────────────────────────────────────────────────────────────────
#  AUTOMATIONS
# ──────────────────────────────────────────────────────────────────────────────

automation:
  # ══════════════════════════════════════════════════════════════════════════
  #  ОСНОВНОЕ УПРАВЛЕНИЕ: применить рекомендуемую позицию к приводу
  #  Rate limit: не чаще 1 реального движения в 30 минут
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Управление вентиляцией по CO2"
    alias: ventilation_control_main
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: time_pattern
        minutes: "/30"

    condition:
      # Позиция реально изменилась
      - condition: template
        value_template: >
          {% set recommended = states('sensor.ventilation_recommended_position') | int(-1) %}
          {% set current = state_attr('cover.ventilation_zap_group', 'current_position') | int(0) %}
          {{ recommended >= 0 and recommended != current }}

      # Rate limit: минимум 30 минут между движениями привода
      - condition: template
        value_template: >
          {% set last = states('input_datetime.ventilation_last_adjustment') %}
          {% set last_ts = as_timestamp(last) | float(0) %}
          {{ (as_timestamp(now()) - last_ts) >= 1800 }}

      # Нет активных ошибок привода
      - condition: template
        value_template: >
          {{ is_state('binary_sensor.drivent_zap_left_datchik_peregruzki', 'off') and
             is_state('binary_sensor.drivent_zap_back_datchik_peregruzki', 'off') }}

      # CO2 сенсор доступен
      - condition: template
        value_template: >
          {{ has_value('sensor.sensor_zap_co2') }}

      # На улице не холоднее минимального порога
      - condition: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor >= min_temp }}

    action:
      - variables:
          recommended: "{{ states('sensor.ventilation_recommended_position') | int(0) }}"

      - service: cover.set_cover_position
        target:
          entity_id: cover.ventilation_zap_group
        data:
          position: "{{ recommended }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ══════════════════════════════════════════════════════════════════════════
  #  АВАРИЙНОЕ ЗАКРЫТИЕ: температура, дождь, перегрузка, недоступность CO2
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Аварийное закрытие окна"
    alias: ventilation_safety_close
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      # Температура на улице упала ниже минимума
      - platform: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor < min_temp }}
        id: "cold"

      # Перегрузка привода
      - platform: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        to: "on"
        id: "overload"

      - platform: state
        entity_id: binary_sensor.drivent_zap_back_datchik_peregruzki
        to: "on"
        id: "overload"

      # CO2 сенсор стал unavailable (потеря связи)
      - platform: state
        entity_id: sensor.sensor_zap_co2
        to: "unavailable"
        for:
          minutes: 2
        id: "co2_lost"

      # Периодическая проверка (каждые 10 мин)
      - platform: time_pattern
        minutes: "/10"
        id: "periodic"

    condition:
      # Окно реально открыто
      - condition: template
        value_template: >
          {{ state_attr('cover.ventilation_zap_group', 'current_position') | int(0) > 0 }}

      # Хотя бы одно условие для закрытия выполнено
      - condition: or
        conditions:
          # Слишком холодно на улице
          - condition: template
            value_template: >
              {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
              {% set min_temp = states('input_number.ventilation_eva_min_outdoor_temp') | float(-10) %}
              {{ outdoor < min_temp }}
          # Перегрузка привода
          - condition: state
            entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
            state: "on"
          - condition: state
            entity_id: binary_sensor.drivent_zap_back_datchik_peregruzki
            state: "on"
          # CO2 сенсор недоступен
          - condition: state
            entity_id: sensor.sensor_zap_co2
            state: "unavailable"

    action:
      - variables:
          reason: >
            {% if is_state('binary_sensor.drivent_zap_left_datchik_peregruzki', 'on') %}
              overload_left
            {% elif is_state('binary_sensor.drivent_zap_back_datchik_peregruzki', 'on') %}
              overload_back
            {% elif is_state('sensor.sensor_zap_co2', 'unavailable') %}
              co2_sensor_lost
            {% else %}
              cold_outdoor
            {% endif %}

      - service: cover.close_cover
        target:
          entity_id: cover.ventilation_zap_group

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: notify.zapgroup
        data:
          title: "🪟 Окно закрыто (безопасность)"
          message: >
            Причина: {{ reason }}.
            {% if reason == 'cold_outdoor' %}
              Температура на улице: {{ state_attr('weather.forecast_home_assistant', 'temperature') }}°C
              (мин: {{ states('input_number.ventilation_min_outdoor_temp') }}°C).
            {% elif reason in ['overload_left', 'overload_back'] %}
              Привод обнаружил перегрузку ({{ reason }}). Проверьте окна.
            {% elif reason == 'co2_sensor_lost' %}
              Датчик CO2 недоступен. Окно закрыто в целях безопасности.
            {% endif %}

  # ══════════════════════════════════════════════════════════════════════════
  #  УВЕДОМЛЕНИЕ ОБ ОШИБКЕ ПРИВОДА
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Ошибка привода окна"
    alias: ventilation_device_error
    mode: single
    initial_state: true

    trigger:
      - platform: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        to: "on"

      - platform: state
        entity_id: binary_sensor.drivent_zap_back_datchik_peregruzki
        to: "on"

    action:
      - service: notify.zapgroup
        data:
          title: "⚠️ Перегрузка привода Drivent (zap_left)"
          message: >
            Привод обнаружил перегрузку. Проверьте:
            - не зажато ли что-то в окне
            - открывается ли окно без заеданий
            - не заблокирована ли ручка

            Текущий CO2: {{ states('sensor.sensor_zap_co2') }} ppm
            Позиция группы окон: {{ state_attr('cover.ventilation_zap_group', 'current_position') }}%

  # ══════════════════════════════════════════════════════════════════════════
  #  EVA: ОСНОВНОЕ УПРАВЛЕНИЕ
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Управление вентиляцией по CO2 eva"
    alias: ventilation_eva_control_main
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: time_pattern
        minutes: "/30"

    condition:
      - condition: template
        value_template: >
          {% set recommended = states('sensor.ventilation_eva_recommended_position') | int(-1) %}
          {% set current = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | int(0) %}
          {{ recommended >= 0 and recommended != current }}

      - condition: template
        value_template: >
          {% set last = states('input_datetime.ventilation_eva_last_adjustment') %}
          {% set last_ts = as_timestamp(last) | float(0) %}
          {{ (as_timestamp(now()) - last_ts) >= 1800 }}

      - condition: state
        entity_id: binary_sensor.drivent_eva_datchik_peregruzki
        state: "off"

      - condition: template
        value_template: >
          {{ has_value('sensor.sensor_eva_co2') }}

      - condition: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_eva_min_outdoor_temp') | float(-10) %}
          {{ outdoor >= min_temp }}

    action:
      - variables:
          recommended: "{{ states('sensor.ventilation_eva_recommended_position') | int(0) }}"

      - service: cover.set_cover_position
        target:
          entity_id: cover.drivent_eva_driventokonnyi_privod
        data:
          position: "{{ recommended }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_eva_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ══════════════════════════════════════════════════════════════════════════
  #  EVA: АВАРИЙНОЕ ЗАКРЫТИЕ
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Аварийное закрытие окна eva"
    alias: ventilation_eva_safety_close
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_eva_min_outdoor_temp') | float(-10) %}
          {{ outdoor < min_temp }}
        id: "cold"

      - platform: state
        entity_id: binary_sensor.drivent_eva_datchik_peregruzki
        to: "on"
        id: "overload"

      - platform: state
        entity_id: sensor.sensor_eva_co2
        to: "unavailable"
        for:
          minutes: 2
        id: "co2_lost"

      - platform: time_pattern
        minutes: "/10"
        id: "periodic"

    condition:
      - condition: template
        value_template: >
          {{ state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | int(0) > 0 }}

      - condition: or
        conditions:
          - condition: template
            value_template: >
              {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
              {% set min_temp = states('input_number.ventilation_eva_min_outdoor_temp') | float(-10) %}
              {{ outdoor < min_temp }}
          - condition: state
            entity_id: binary_sensor.drivent_eva_datchik_peregruzki
            state: "on"
          - condition: state
            entity_id: sensor.sensor_eva_co2
            state: "unavailable"

    action:
      - variables:
          reason: >
            {% if is_state('binary_sensor.drivent_eva_datchik_peregruzki', 'on') %}
              overload
            {% elif is_state('sensor.sensor_eva_co2', 'unavailable') %}
              co2_sensor_lost
            {% else %}
              cold_outdoor
            {% endif %}

      - service: cover.close_cover
        target:
          entity_id: cover.drivent_eva_driventokonnyi_privod

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_eva_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: notify.zapgroup
        data:
          title: "🪟 Окно Eva закрыто (безопасность)"
          message: >
            Причина: {{ reason }}.
            {% if reason == 'cold_outdoor' %}
              Температура на улице: {{ state_attr('weather.forecast_home_assistant', 'temperature') }}°C
              (мин: {{ states('input_number.ventilation_eva_min_outdoor_temp') }}°C).
            {% elif reason == 'overload' %}
              Привод Eva обнаружил перегрузку. Проверьте окно.
            {% elif reason == 'co2_sensor_lost' %}
              Датчик CO2 Eva недоступен. Окно закрыто в целях безопасности.
            {% endif %}

  # ══════════════════════════════════════════════════════════════════════════
  #  EVA: УВЕДОМЛЕНИЕ ОБ ОШИБКЕ ПРИВОДА
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Ошибка привода окна eva"
    alias: ventilation_eva_device_error
    mode: single
    initial_state: true

    trigger:
      - platform: state
        entity_id: binary_sensor.drivent_eva_datchik_peregruzki
        to: "on"

    action:
      - service: notify.zapgroup
        data:
          title: "⚠️ Перегрузка привода Drivent (eva)"
          message: >
            Привод Eva обнаружил перегрузку. Проверьте:
            - не зажато ли что-то в окне
            - открывается ли окно без заеданий
            - не заблокирована ли ручка

            Текущий CO2 Eva: {{ states('sensor.sensor_eva_co2') }} ppm
            Позиция окна Eva: {{ state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') }}%
