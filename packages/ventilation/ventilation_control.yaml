  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 4: EVA — room-local 10m forecast + auto-identified PI controller
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.sensor_eva_co2
          - sensor.ventilation_eva_co2_filtered
          - sensor.ventilation_eva_co2_slope
          - input_number.ventilation_eva_target_co2
          - input_number.ventilation_eva_min_position
          - input_number.ventilation_eva_max_position
          - input_number.ventilation_eva_deadband_ppm
          - cover.drivent_eva_driventokonnyi_privod
          - input_datetime.ventilation_eva_last_adjustment
