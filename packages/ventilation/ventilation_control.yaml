# package: ventilation_multiroom
# Version: 1.2.0
# Last Updated: 2026-04-13
# Description: Hybrid long-horizon CO2 ventilation control for zap/eva rooms
#
# АЛГОРИТМ: Гибридное управление по сглаженному CO2, длинному тренду и переменному шагу.
# НЕ PID — привод двигается не чаще одного раза в 30 минут, но размер шага зависит от величины ошибки.
# Малые ошибки подтверждаются трендом, большие ошибки двигаются сразу более крупным шагом.
#
# РЕСУРС ПРИВОДА: WindowMaster рейтинг ~10 000 циклов.
# С длинным тренд-фильтром: реальных движений заметно меньше, чем при коротком шумном контуре.
# Drivent V2 магнитный датчик надёжнее V1 — реальный ресурс выше.

# ──────────────────────────────────────────────────────────────────────────────
#  INPUT NUMBERS (настройки регулирования)
# ──────────────────────────────────────────────────────────────────────────────

input_number:
  # Zap room (legacy/default entity names stay attached here for compatibility)
  ventilation_target_co2:
    name: "Ventilation Target CO2"
    min: 300
    max: 1000
    step: 50
    unit_of_measurement: "ppm"
    icon: mdi:molecule-co2
    mode: box

  ventilation_min_position:
    name: "Ventilation Min Position"
    min: 0
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:arrow-collapse-down
    mode: box

  ventilation_max_position:
    name: "Ventilation Max Position"
    min: 20
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:arrow-collapse-up
    mode: box

  ventilation_min_outdoor_temp:
    name: "Ventilation Min Outdoor Temp"
    min: -30
    max: 10
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-alert
    mode: box

input_datetime:
  ventilation_last_adjustment:
    name: "Ventilation Last Adjustment"
    has_date: true
    has_time: true
    icon: mdi:clock-check-outline
    initial: "2000-01-01 00:00:00"

  ventilation_eva_last_adjustment:
    name: "Ventilation Eva Last Adjustment"
    has_date: true
    has_time: true
    icon: mdi:clock-check-outline
    initial: "2000-01-01 00:00:00"

# ──────────────────────────────────────────────────────────────────────────────
#  GROUPED COVERS (логические приводы комнаты)
# ──────────────────────────────────────────────────────────────────────────────

cover:
  - platform: group
    name: "Ventilation Zap Group"
    unique_id: ventilation_zap_group
    entities:
      - cover.drivent_zap_left_driventokonnyi_privod
      - cover.drivent_zap_back_driventokonnyi_privod

# ──────────────────────────────────────────────────────────────────────────────
#  STATISTICS SENSORS (сглаживание и длинный тренд CO2)
# ──────────────────────────────────────────────────────────────────────────────

sensor:
  - platform: statistics
    name: "Ventilation CO2 Mean 30m"
    unique_id: ventilation_co2_mean_30m
    entity_id: sensor.sensor_zap_co2
    state_characteristic: average_step
    max_age:
      minutes: 30
    sampling_size: 240
    keep_last_sample: true
    precision: 1

  - platform: statistics
    name: "Ventilation CO2 Change 30m"
    unique_id: ventilation_co2_change_30m
    entity_id: sensor.sensor_zap_co2
    state_characteristic: change
    max_age:
      minutes: 30
    sampling_size: 240
    keep_last_sample: true
    precision: 1

  - platform: statistics
    name: "Ventilation Eva CO2 Mean 30m"
    unique_id: ventilation_eva_co2_mean_30m
    entity_id: sensor.sensor_eva_co2
    state_characteristic: average_step
    max_age:
      minutes: 30
    sampling_size: 240
    keep_last_sample: true
    precision: 1

  - platform: statistics
    name: "Ventilation Eva CO2 Change 30m"
    unique_id: ventilation_eva_co2_change_30m
    entity_id: sensor.sensor_eva_co2
    state_characteristic: change
    max_age:
      minutes: 30
    sampling_size: 240
    keep_last_sample: true
    precision: 1

  - platform: filter
    name: "Ventilation CO2 Filtered"
    unique_id: ventilation_co2_filtered
    entity_id: sensor.sensor_zap_co2
    filters:
      - filter: lowpass
        time_constant: 8
        precision: 1

  - platform: filter
    name: "Ventilation Eva CO2 Filtered"
    unique_id: ventilation_eva_co2_filtered
    entity_id: sensor.sensor_eva_co2
    filters:
      - filter: lowpass
        time_constant: 8
        precision: 1

  - platform: derivative
    source: sensor.ventilation_co2_filtered
    name: "Ventilation CO2 Slope"
    unique_id: ventilation_co2_slope
    round: 3
    unit_time: min
    time_window: "00:15:00"

  - platform: derivative
    source: sensor.ventilation_eva_co2_filtered
    name: "Ventilation Eva CO2 Slope"
    unique_id: ventilation_eva_co2_slope
    round: 3
    unit_time: min
    time_window: "00:15:00"

# ──────────────────────────────────────────────────────────────────────────────
#  TEMPLATE SENSORS
# ──────────────────────────────────────────────────────────────────────────────

template:
  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 1: ДОЛГИЙ ТРЕНД CO2 (30-минутное изменение + сглаженное среднее)
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.ventilation_co2_filtered
          - sensor.ventilation_co2_slope
      - platform: homeassistant
        event: start
    sensor:
      - name: "CO2 Trend"
        unique_id: ventilation_co2_trend
        icon: mdi:trending-up
        availability: >
          {{ has_value('sensor.sensor_zap_co2') and
             has_value('sensor.ventilation_co2_filtered') and
             has_value('sensor.ventilation_co2_slope') }}
        state: >
          {% set slope = states('sensor.ventilation_co2_slope') | float(0) %}
          {% set trend_threshold = 0.5 %}
          {% if slope > trend_threshold %}
            rising
          {% elif slope < -trend_threshold %}
            falling
          {% else %}
            stable
          {% endif %}
        attributes:
          current_co2: "{{ states('sensor.sensor_zap_co2') | float(0) }}"
          co2_filtered: "{{ states('sensor.ventilation_co2_filtered') | float(0) }}"
          co2_slope_ppm_min: "{{ states('sensor.ventilation_co2_slope') | float(0) }}"
          trend_threshold_ppm_min: 0.5
          filter_type: "ema_lowpass"

  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 2: ZAP — FORECAST + CONTINUOUS RECOMMENDATION
  #  Recommendation updates continuously from filtered CO2 and trend.
  #  Physical movement stays in a separate 30-minute actuation layer.
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.sensor_zap_co2
          - sensor.ventilation_co2_filtered
          - sensor.ventilation_co2_slope
          - input_number.ventilation_target_co2
          - input_number.ventilation_min_position
          - input_number.ventilation_max_position
      - platform: homeassistant
        event: start
    sensor:
      - name: "Ventilation Forecast CO2 30m"
        unique_id: ventilation_forecast_co2_30m
        unit_of_measurement: "ppm"
        icon: mdi:chart-timeline-variant
        availability: >
          {{ has_value('sensor.sensor_zap_co2') and
             has_value('sensor.ventilation_co2_filtered') and
             has_value('sensor.ventilation_co2_slope') }}
        state: >
          {% set raw_co2 = states('sensor.sensor_zap_co2') | float(650) %}
          {% set filtered = states('sensor.ventilation_co2_filtered') | float(raw_co2) %}
          {% set slope = states('sensor.ventilation_co2_slope') | float(0) %}
          {{ (filtered + slope * 30) | round(1) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_zap_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_co2_filtered') | float(0) }}"
          slope_ppm_min: "{{ states('sensor.ventilation_co2_slope') | float(0) }}"
          forecast_horizon_min: 30

      - name: "Ventilation Forecast Error 30m"
        unique_id: ventilation_forecast_error_30m
        unit_of_measurement: "ppm"
        state_class: measurement
        icon: mdi:delta
        availability: >
          {{ has_value('sensor.ventilation_forecast_co2_30m') }}
        state: >
          {% set forecast = states('sensor.ventilation_forecast_co2_30m') | float(650) %}
          {% set target = states('input_number.ventilation_target_co2') | float(650) %}
          {{ (forecast - target) | round(0) }}
        attributes:
          forecast_co2_30m: "{{ states('sensor.ventilation_forecast_co2_30m') | float(0) }}"
          target: "{{ states('input_number.ventilation_target_co2') | float(650) }}"
          deadband_ppm: 50

      - name: "Ventilation Recommended Position"
        unique_id: ventilation_recommended_position
        unit_of_measurement: "%"
        icon: mdi:window-open-variant
        availability: >
          {{ has_value('sensor.sensor_zap_co2') and
             has_value('sensor.ventilation_co2_filtered') and
             has_value('sensor.ventilation_co2_slope') and
             has_value('sensor.ventilation_forecast_error_30m') and
             has_value('cover.ventilation_zap_group') }}
        state: >
          {% set raw_co2 = states('sensor.sensor_zap_co2') | float(650) %}
          {% set filtered = states('sensor.ventilation_co2_filtered') | float(raw_co2) %}
          {% set slope = states('sensor.ventilation_co2_slope') | float(0) %}
          {% set forecast_error = states('sensor.ventilation_forecast_error_30m') | float(0) %}
          {% set abs_forecast_error = forecast_error | abs %}
          {% set min_pos = states('input_number.ventilation_min_position') | int(0) %}
          {% set max_pos = states('input_number.ventilation_max_position') | int(80) %}
          {% set current_pos = state_attr('cover.ventilation_zap_group', 'current_position') | int(min_pos) %}
          {% set previous_recommended = states('sensor.ventilation_recommended_position') %}
          {% set previous = previous_recommended | int(current_pos) if previous_recommended not in ['unknown', 'unavailable', 'none', ''] else current_pos %}
          {% set deadband = 50 %}
          {% set sharp_slope = 1.5 %}
          {% set delta = 0 %}
          {% set trend_supports_error = (forecast_error > 0 and slope > 0) or (forecast_error < 0 and slope < 0) %}
          {% if abs_forecast_error <= deadband %}
            {% if slope > sharp_slope %}
              {% set delta = 2 %}
            {% elif slope < -sharp_slope %}
              {% set delta = -2 %}
            {% endif %}
          {% else %}
            {% set error_over = abs_forecast_error - deadband %}
            {% set base_delta = 0.5 + (error_over / 80) + ((slope | abs) / 1.2) %}
            {% if not trend_supports_error and abs_forecast_error <= 120 %}
              {% set base_delta = base_delta * 0.5 %}
            {% endif %}
            {% set base_delta = [base_delta, 4.0] | min %}
            {% if forecast_error > 0 %}
              {% set delta = base_delta %}
            {% else %}
              {% set delta = 0 - base_delta %}
            {% endif %}
          {% endif %}
          {% set new_recommended = previous + delta %}
          {% set new_recommended = [new_recommended, min_pos] | max %}
          {% set new_recommended = [new_recommended, max_pos] | min %}
          {{ new_recommended | round(1) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_zap_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_co2_filtered') | float(0) }}"
          slope_ppm_min: "{{ states('sensor.ventilation_co2_slope') | float(0) }}"
          forecast_co2_30m: "{{ states('sensor.ventilation_forecast_co2_30m') | float(0) }}"
          forecast_error_30m: "{{ states('sensor.ventilation_forecast_error_30m') | float(0) }}"
          target: "{{ states('input_number.ventilation_target_co2') | float(650) }}"
          deadband_ppm: 50
          sharp_slope_ppm_min: 1.5
          current_position: "{{ state_attr('cover.ventilation_zap_group', 'current_position') | int(0) }}"
          controller_mode: >
            {% set forecast_error = states('sensor.ventilation_forecast_error_30m') | float(0) %}
            {% set abs_forecast_error = forecast_error | abs %}
            {% set slope = states('sensor.ventilation_co2_slope') | float(0) %}
            {% if abs_forecast_error <= 50 %}
              {% if slope > 1.5 %}
                deadband_opening_bias
              {% elif slope < -1.5 %}
                deadband_closing_bias
              {% else %}
                deadband_hold
              {% endif %}
            {% elif forecast_error > 0 %}
              opening_response
            {% else %}
              closing_response
            {% endif %}
          controller_delta: >
            {% set slope = states('sensor.ventilation_co2_slope') | float(0) %}
            {% set forecast_error = states('sensor.ventilation_forecast_error_30m') | float(0) %}
            {% set abs_forecast_error = forecast_error | abs %}
            {% set delta = 0 %}
            {% set trend_supports_error = (forecast_error > 0 and slope > 0) or (forecast_error < 0 and slope < 0) %}
            {% if abs_forecast_error <= 50 %}
              {% if slope > 1.5 %}
                {% set delta = 2 %}
              {% elif slope < -1.5 %}
                {% set delta = -2 %}
              {% endif %}
            {% else %}
              {% set error_over = abs_forecast_error - 50 %}
              {% set base_delta = 0.5 + (error_over / 80) + ((slope | abs) / 1.2) %}
              {% if not trend_supports_error and abs_forecast_error <= 120 %}
                {% set base_delta = base_delta * 0.5 %}
              {% endif %}
              {% set base_delta = [base_delta, 4.0] | min %}
              {% if forecast_error > 0 %}
                {% set delta = base_delta %}
              {% else %}
                {% set delta = 0 - base_delta %}
              {% endif %}
            {% endif %}
            {{ delta | round(2) }}

      - name: "Ventilation CO2 Error"
        unique_id: ventilation_co2_error
        unit_of_measurement: "ppm"
        state_class: measurement
        icon: mdi:delta
        availability: >
          {{ has_value('sensor.ventilation_forecast_error_30m') }}
        state: >
          {{ states('sensor.ventilation_forecast_error_30m') | float(0) | round(0) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_zap_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_co2_filtered') | float(0) }}"
          forecast_co2_30m: "{{ states('sensor.ventilation_forecast_co2_30m') | float(0) }}"
          error_source: "forecast_error_30m"

  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 3: EVA — ДОЛГИЙ ТРЕНД CO2
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.ventilation_eva_co2_filtered
          - sensor.ventilation_eva_co2_slope
      - platform: homeassistant
        event: start
    sensor:
      - name: "Eva CO2 Trend"
        unique_id: ventilation_eva_co2_trend
        icon: mdi:trending-up
        availability: >
          {{ has_value('sensor.sensor_eva_co2') and
             has_value('sensor.ventilation_eva_co2_filtered') and
             has_value('sensor.ventilation_eva_co2_slope') }}
        state: >
          {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
          {% set trend_threshold = 0.5 %}
          {% if slope > trend_threshold %}
            rising
          {% elif slope < -trend_threshold %}
            falling
          {% else %}
            stable
          {% endif %}
        attributes:
          current_co2: "{{ states('sensor.sensor_eva_co2') | float(0) }}"
          co2_filtered: "{{ states('sensor.ventilation_eva_co2_filtered') | float(0) }}"
          co2_slope_ppm_min: "{{ states('sensor.ventilation_eva_co2_slope') | float(0) }}"
          trend_threshold_ppm_min: 0.5
          filter_type: "ema_lowpass"

  # ════════════════════════════════════════════════════════════════════════════
  #  БЛОК 4: EVA — FORECAST + CONTINUOUS RECOMMENDATION
  # ════════════════════════════════════════════════════════════════════════════
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.sensor_eva_co2
          - sensor.ventilation_eva_co2_filtered
          - sensor.ventilation_eva_co2_slope
          - input_number.ventilation_target_co2
          - input_number.ventilation_min_position
          - input_number.ventilation_max_position
      - platform: homeassistant
        event: start
    sensor:
      - name: "Ventilation Eva Forecast CO2 30m"
        unique_id: ventilation_eva_forecast_co2_30m
        unit_of_measurement: "ppm"
        icon: mdi:chart-timeline-variant
        availability: >
          {{ has_value('sensor.sensor_eva_co2') and
             has_value('sensor.ventilation_eva_co2_filtered') and
             has_value('sensor.ventilation_eva_co2_slope') }}
        state: >
          {% set raw_co2 = states('sensor.sensor_eva_co2') | float(650) %}
          {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(raw_co2) %}
          {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
          {{ (filtered + slope * 30) | round(1) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_eva_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_eva_co2_filtered') | float(0) }}"
          slope_ppm_min: "{{ states('sensor.ventilation_eva_co2_slope') | float(0) }}"
          forecast_horizon_min: 30

      - name: "Ventilation Eva Forecast Error 30m"
        unique_id: ventilation_eva_forecast_error_30m
        unit_of_measurement: "ppm"
        state_class: measurement
        icon: mdi:delta
        availability: >
          {{ has_value('sensor.ventilation_eva_forecast_co2_30m') }}
        state: >
          {% set forecast = states('sensor.ventilation_eva_forecast_co2_30m') | float(650) %}
          {% set target = states('input_number.ventilation_target_co2') | float(650) %}
          {{ (forecast - target) | round(0) }}
        attributes:
          forecast_co2_30m: "{{ states('sensor.ventilation_eva_forecast_co2_30m') | float(0) }}"
          target: "{{ states('input_number.ventilation_target_co2') | float(650) }}"
          deadband_ppm: 50

      - name: "Ventilation Eva Recommended Position"
        unique_id: ventilation_eva_recommended_position
        unit_of_measurement: "%"
        icon: mdi:window-open-variant
        availability: >
          {{ has_value('sensor.sensor_eva_co2') and
             has_value('sensor.ventilation_eva_co2_filtered') and
             has_value('sensor.ventilation_eva_co2_slope') and
             has_value('sensor.ventilation_eva_forecast_error_30m') and
             has_value('cover.drivent_eva_driventokonnyi_privod') }}
        state: >
          {% set raw_co2 = states('sensor.sensor_eva_co2') | float(650) %}
          {% set filtered = states('sensor.ventilation_eva_co2_filtered') | float(raw_co2) %}
          {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
          {% set forecast_error = states('sensor.ventilation_eva_forecast_error_30m') | float(0) %}
          {% set abs_forecast_error = forecast_error | abs %}
          {% set min_pos = states('input_number.ventilation_min_position') | int(0) %}
          {% set max_pos = states('input_number.ventilation_max_position') | int(80) %}
          {% set current_pos = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | int(min_pos) %}
          {% set previous_recommended = states('sensor.ventilation_eva_recommended_position') %}
          {% set previous = previous_recommended | int(current_pos) if previous_recommended not in ['unknown', 'unavailable', 'none', ''] else current_pos %}
          {% set deadband = 50 %}
          {% set sharp_slope = 1.5 %}
          {% set delta = 0 %}
          {% set trend_supports_error = (forecast_error > 0 and slope > 0) or (forecast_error < 0 and slope < 0) %}
          {% if abs_forecast_error <= deadband %}
            {% if slope > sharp_slope %}
              {% set delta = 2 %}
            {% elif slope < -sharp_slope %}
              {% set delta = -2 %}
            {% endif %}
          {% else %}
            {% set error_over = abs_forecast_error - deadband %}
            {% set base_delta = 0.5 + (error_over / 80) + ((slope | abs) / 1.2) %}
            {% if not trend_supports_error and abs_forecast_error <= 120 %}
              {% set base_delta = base_delta * 0.5 %}
            {% endif %}
            {% set base_delta = [base_delta, 4.0] | min %}
            {% if forecast_error > 0 %}
              {% set delta = base_delta %}
            {% else %}
              {% set delta = 0 - base_delta %}
            {% endif %}
          {% endif %}
          {% set new_recommended = previous + delta %}
          {% set new_recommended = [new_recommended, min_pos] | max %}
          {% set new_recommended = [new_recommended, max_pos] | min %}
          {{ new_recommended | round(1) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_eva_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_eva_co2_filtered') | float(0) }}"
          slope_ppm_min: "{{ states('sensor.ventilation_eva_co2_slope') | float(0) }}"
          forecast_co2_30m: "{{ states('sensor.ventilation_eva_forecast_co2_30m') | float(0) }}"
          forecast_error_30m: "{{ states('sensor.ventilation_eva_forecast_error_30m') | float(0) }}"
          target: "{{ states('input_number.ventilation_target_co2') | float(650) }}"
          deadband_ppm: 50
          sharp_slope_ppm_min: 1.5
          current_position: "{{ state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | int(0) }}"
          controller_mode: >
            {% set forecast_error = states('sensor.ventilation_eva_forecast_error_30m') | float(0) %}
            {% set abs_forecast_error = forecast_error | abs %}
            {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
            {% if abs_forecast_error <= 50 %}
              {% if slope > 1.5 %}
                deadband_opening_bias
              {% elif slope < -1.5 %}
                deadband_closing_bias
              {% else %}
                deadband_hold
              {% endif %}
            {% elif forecast_error > 0 %}
              opening_response
            {% else %}
              closing_response
            {% endif %}
          controller_delta: >
            {% set slope = states('sensor.ventilation_eva_co2_slope') | float(0) %}
            {% set forecast_error = states('sensor.ventilation_eva_forecast_error_30m') | float(0) %}
            {% set abs_forecast_error = forecast_error | abs %}
            {% set delta = 0 %}
            {% set trend_supports_error = (forecast_error > 0 and slope > 0) or (forecast_error < 0 and slope < 0) %}
            {% if abs_forecast_error <= 50 %}
              {% if slope > 1.5 %}
                {% set delta = 2 %}
              {% elif slope < -1.5 %}
                {% set delta = -2 %}
              {% endif %}
            {% else %}
              {% set error_over = abs_forecast_error - 50 %}
              {% set base_delta = 0.5 + (error_over / 80) + ((slope | abs) / 1.2) %}
              {% if not trend_supports_error and abs_forecast_error <= 120 %}
                {% set base_delta = base_delta * 0.5 %}
              {% endif %}
              {% set base_delta = [base_delta, 4.0] | min %}
              {% if forecast_error > 0 %}
                {% set delta = base_delta %}
              {% else %}
                {% set delta = 0 - base_delta %}
              {% endif %}
            {% endif %}
            {{ delta | round(2) }}

      - name: "Ventilation Eva CO2 Error"
        unique_id: ventilation_eva_co2_error
        unit_of_measurement: "ppm"
        state_class: measurement
        icon: mdi:delta
        availability: >
          {{ has_value('sensor.ventilation_eva_forecast_error_30m') }}
        state: >
          {{ states('sensor.ventilation_eva_forecast_error_30m') | float(0) | round(0) }}
        attributes:
          raw_co2: "{{ states('sensor.sensor_eva_co2') | float(0) }}"
          filtered_co2: "{{ states('sensor.ventilation_eva_co2_filtered') | float(0) }}"
          forecast_co2_30m: "{{ states('sensor.ventilation_eva_forecast_co2_30m') | float(0) }}"
          error_source: "forecast_error_30m"

# ──────────────────────────────────────────────────────────────────────────────
#  AUTOMATIONS
# ──────────────────────────────────────────────────────────────────────────────

automation:
  # ══════════════════════════════════════════════════════════════════════════
  #  ОСНОВНОЕ УПРАВЛЕНИЕ: применить рекомендуемую позицию к приводу
  #  Rate limit: не чаще 1 реального движения в 30 минут
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Управление вентиляцией по CO2"
    alias: ventilation_control_main
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: time_pattern
        minutes: "/30"

    condition:
      # Позиция реально изменилась
      - condition: template
        value_template: >
          {% set recommended = states('sensor.ventilation_recommended_position') | int(-1) %}
          {% set current = state_attr('cover.ventilation_zap_group', 'current_position') | int(0) %}
          {{ recommended >= 0 and recommended != current }}

      # Rate limit: минимум 30 минут между движениями привода
      - condition: template
        value_template: >
          {% set last = states('input_datetime.ventilation_last_adjustment') %}
          {% set last_ts = as_timestamp(last) | float(0) %}
          {{ (as_timestamp(now()) - last_ts) >= 1800 }}

      # Нет активных ошибок привода
      - condition: template
        value_template: >
          {{ is_state('binary_sensor.drivent_zap_left_datchik_peregruzki', 'off') and
             is_state('binary_sensor.drivent_zap_back_datchik_peregruzki', 'off') }}

      # CO2 сенсор доступен
      - condition: template
        value_template: >
          {{ has_value('sensor.sensor_zap_co2') }}

      # На улице не холоднее минимального порога
      - condition: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor >= min_temp }}

    action:
      - variables:
          recommended: "{{ states('sensor.ventilation_recommended_position') | int(0) }}"

      - service: cover.set_cover_position
        target:
          entity_id: cover.ventilation_zap_group
        data:
          position: "{{ recommended }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ══════════════════════════════════════════════════════════════════════════
  #  АВАРИЙНОЕ ЗАКРЫТИЕ: температура, дождь, перегрузка, недоступность CO2
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Аварийное закрытие окна"
    alias: ventilation_safety_close
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      # Температура на улице упала ниже минимума
      - platform: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor < min_temp }}
        id: "cold"

      # Перегрузка привода
      - platform: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        to: "on"
        id: "overload"

      - platform: state
        entity_id: binary_sensor.drivent_zap_back_datchik_peregruzki
        to: "on"
        id: "overload"

      # CO2 сенсор стал unavailable (потеря связи)
      - platform: state
        entity_id: sensor.sensor_zap_co2
        to: "unavailable"
        for:
          minutes: 2
        id: "co2_lost"

      # Периодическая проверка (каждые 10 мин)
      - platform: time_pattern
        minutes: "/10"
        id: "periodic"

    condition:
      # Окно реально открыто
      - condition: template
        value_template: >
          {{ state_attr('cover.ventilation_zap_group', 'current_position') | int(0) > 0 }}

      # Хотя бы одно условие для закрытия выполнено
      - condition: or
        conditions:
          # Слишком холодно на улице
          - condition: template
            value_template: >
              {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
              {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
              {{ outdoor < min_temp }}
          # Перегрузка привода
          - condition: state
            entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
            state: "on"
          - condition: state
            entity_id: binary_sensor.drivent_zap_back_datchik_peregruzki
            state: "on"
          # CO2 сенсор недоступен
          - condition: state
            entity_id: sensor.sensor_zap_co2
            state: "unavailable"

    action:
      - variables:
          reason: >
            {% if is_state('binary_sensor.drivent_zap_left_datchik_peregruzki', 'on') %}
              overload_left
            {% elif is_state('binary_sensor.drivent_zap_back_datchik_peregruzki', 'on') %}
              overload_back
            {% elif is_state('sensor.sensor_zap_co2', 'unavailable') %}
              co2_sensor_lost
            {% else %}
              cold_outdoor
            {% endif %}

      - service: cover.close_cover
        target:
          entity_id: cover.ventilation_zap_group

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: notify.zapgroup
        data:
          title: "🪟 Окно закрыто (безопасность)"
          message: >
            Причина: {{ reason }}.
            {% if reason == 'cold_outdoor' %}
              Температура на улице: {{ state_attr('weather.forecast_home_assistant', 'temperature') }}°C
              (мин: {{ states('input_number.ventilation_min_outdoor_temp') }}°C).
            {% elif reason in ['overload_left', 'overload_back'] %}
              Привод обнаружил перегрузку ({{ reason }}). Проверьте окна.
            {% elif reason == 'co2_sensor_lost' %}
              Датчик CO2 недоступен. Окно закрыто в целях безопасности.
            {% endif %}

  # ══════════════════════════════════════════════════════════════════════════
  #  УВЕДОМЛЕНИЕ ОБ ОШИБКЕ ПРИВОДА
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Ошибка привода окна"
    alias: ventilation_device_error
    mode: single
    initial_state: true

    trigger:
      - platform: state
        entity_id: binary_sensor.drivent_zap_left_datchik_peregruzki
        to: "on"

      - platform: state
        entity_id: binary_sensor.drivent_zap_back_datchik_peregruzki
        to: "on"

    action:
      - service: notify.zapgroup
        data:
          title: "⚠️ Перегрузка привода Drivent (zap_left)"
          message: >
            Привод обнаружил перегрузку. Проверьте:
            - не зажато ли что-то в окне
            - открывается ли окно без заеданий
            - не заблокирована ли ручка

            Текущий CO2: {{ states('sensor.sensor_zap_co2') }} ppm
            Позиция группы окон: {{ state_attr('cover.ventilation_zap_group', 'current_position') }}%

  # ══════════════════════════════════════════════════════════════════════════
  #  EVA: ОСНОВНОЕ УПРАВЛЕНИЕ
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Управление вентиляцией по CO2 eva"
    alias: ventilation_eva_control_main
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: time_pattern
        minutes: "/30"

    condition:
      - condition: template
        value_template: >
          {% set recommended = states('sensor.ventilation_eva_recommended_position') | int(-1) %}
          {% set current = state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | int(0) %}
          {{ recommended >= 0 and recommended != current }}

      - condition: template
        value_template: >
          {% set last = states('input_datetime.ventilation_eva_last_adjustment') %}
          {% set last_ts = as_timestamp(last) | float(0) %}
          {{ (as_timestamp(now()) - last_ts) >= 1800 }}

      - condition: state
        entity_id: binary_sensor.drivent_eva_datchik_peregruzki
        state: "off"

      - condition: template
        value_template: >
          {{ has_value('sensor.sensor_eva_co2') }}

      - condition: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor >= min_temp }}

    action:
      - variables:
          recommended: "{{ states('sensor.ventilation_eva_recommended_position') | int(0) }}"

      - service: cover.set_cover_position
        target:
          entity_id: cover.drivent_eva_driventokonnyi_privod
        data:
          position: "{{ recommended }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_eva_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ══════════════════════════════════════════════════════════════════════════
  #  EVA: АВАРИЙНОЕ ЗАКРЫТИЕ
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Аварийное закрытие окна eva"
    alias: ventilation_eva_safety_close
    mode: single
    max_exceeded: silent
    initial_state: true

    trigger:
      - platform: template
        value_template: >
          {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
          {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
          {{ outdoor < min_temp }}
        id: "cold"

      - platform: state
        entity_id: binary_sensor.drivent_eva_datchik_peregruzki
        to: "on"
        id: "overload"

      - platform: state
        entity_id: sensor.sensor_eva_co2
        to: "unavailable"
        for:
          minutes: 2
        id: "co2_lost"

      - platform: time_pattern
        minutes: "/10"
        id: "periodic"

    condition:
      - condition: template
        value_template: >
          {{ state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') | int(0) > 0 }}

      - condition: or
        conditions:
          - condition: template
            value_template: >
              {% set outdoor = state_attr('weather.forecast_home_assistant', 'temperature') | float(0) %}
              {% set min_temp = states('input_number.ventilation_min_outdoor_temp') | float(-10) %}
              {{ outdoor < min_temp }}
          - condition: state
            entity_id: binary_sensor.drivent_eva_datchik_peregruzki
            state: "on"
          - condition: state
            entity_id: sensor.sensor_eva_co2
            state: "unavailable"

    action:
      - variables:
          reason: >
            {% if is_state('binary_sensor.drivent_eva_datchik_peregruzki', 'on') %}
              overload
            {% elif is_state('sensor.sensor_eva_co2', 'unavailable') %}
              co2_sensor_lost
            {% else %}
              cold_outdoor
            {% endif %}

      - service: cover.close_cover
        target:
          entity_id: cover.drivent_eva_driventokonnyi_privod

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ventilation_eva_last_adjustment
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: notify.zapgroup
        data:
          title: "🪟 Окно Eva закрыто (безопасность)"
          message: >
            Причина: {{ reason }}.
            {% if reason == 'cold_outdoor' %}
              Температура на улице: {{ state_attr('weather.forecast_home_assistant', 'temperature') }}°C
              (мин: {{ states('input_number.ventilation_min_outdoor_temp') }}°C).
            {% elif reason == 'overload' %}
              Привод Eva обнаружил перегрузку. Проверьте окно.
            {% elif reason == 'co2_sensor_lost' %}
              Датчик CO2 Eva недоступен. Окно закрыто в целях безопасности.
            {% endif %}

  # ══════════════════════════════════════════════════════════════════════════
  #  EVA: УВЕДОМЛЕНИЕ ОБ ОШИБКЕ ПРИВОДА
  # ══════════════════════════════════════════════════════════════════════════
  - id: "Ошибка привода окна eva"
    alias: ventilation_eva_device_error
    mode: single
    initial_state: true

    trigger:
      - platform: state
        entity_id: binary_sensor.drivent_eva_datchik_peregruzki
        to: "on"

    action:
      - service: notify.zapgroup
        data:
          title: "⚠️ Перегрузка привода Drivent (eva)"
          message: >
            Привод Eva обнаружил перегрузку. Проверьте:
            - не зажато ли что-то в окне
            - открывается ли окно без заеданий
            - не заблокирована ли ручка

            Текущий CO2 Eva: {{ states('sensor.sensor_eva_co2') }} ppm
            Позиция окна Eva: {{ state_attr('cover.drivent_eva_driventokonnyi_privod', 'current_position') }}%
